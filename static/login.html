<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – AEROSENSE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #020818;
            --card-bg: rgba(10, 17, 35, 0.90);
            --card-border: rgba(59, 130, 246, 0.22);
            --card-shadow: 0 0 80px rgba(59,130,246,0.1), 0 32px 64px rgba(0,0,0,0.65);
            --input-bg: rgba(255,255,255,0.05);
            --input-border: rgba(255,255,255,0.1);
            --input-focus-border: #3b82f6;
            --input-focus-shadow: rgba(59,130,246,0.16);
            --input-color: #f1f5f9;
            --placeholder: rgba(148,163,184,0.55);
            --label: #94a3b8;
            --text: #e2e8f0;
            --muted: #64748b;
            --link: #60a5fa;
            --blue: #3b82f6;
            --indigo: #6366f1;
            --divider: rgba(255,255,255,0.07);
            --check-border: rgba(255,255,255,0.15);
        }

        [data-theme="light"] {
            --bg: #eef2ff;
            --card-bg: rgba(255,255,255,0.96);
            --card-border: rgba(99,102,241,0.18);
            --card-shadow: 0 20px 60px rgba(0,0,0,0.09), 0 0 0 1px rgba(99,102,241,0.1);
            --input-bg: #f8fafc;
            --input-border: #e2e8f0;
            --input-focus-border: #3b82f6;
            --input-focus-shadow: rgba(59,130,246,0.12);
            --input-color: #0f172a;
            --placeholder: #94a3b8;
            --label: #475569;
            --text: #1e293b;
            --muted: #64748b;
            --link: #2563eb;
            --blue: #2563eb;
            --indigo: #4f46e5;
            --divider: rgba(0,0,0,0.07);
            --check-border: #cbd5e1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Starfield canvas */
        #stars-canvas {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0;
        }

        /* Floating ambient orbs */
        .orb {
            position: fixed; border-radius: 50%;
            filter: blur(70px); pointer-events: none; z-index: 0;
            animation: float-orb 9s ease-in-out infinite;
        }
        .orb-1 { width:420px;height:420px; background:radial-gradient(circle,rgba(59,130,246,.14),transparent); top:-120px;left:-120px; animation-delay:0s; }
        .orb-2 { width:320px;height:320px; background:radial-gradient(circle,rgba(139,92,246,.11),transparent); bottom:-80px;right:-80px; animation-delay:-3.5s; }
        .orb-3 { width:220px;height:220px; background:radial-gradient(circle,rgba(16,185,129,.09),transparent); top:55%;left:65%; animation-delay:-6s; }
        @keyframes float-orb {
            0%,100% { transform:translate(0,0) scale(1); }
            33%      { transform:translate(18px,-18px) scale(1.04); }
            66%      { transform:translate(-10px,12px) scale(0.96); }
        }

        /* Grid */
        .grid-overlay {
            position:fixed; inset:0; pointer-events:none; z-index:0;
            background-image:
                linear-gradient(rgba(59,130,246,.028) 1px,transparent 1px),
                linear-gradient(90deg,rgba(59,130,246,.028) 1px,transparent 1px);
            background-size: 52px 52px;
        }

        /* Card */
        .auth-card {
            position:relative; z-index:10;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 44px 42px 38px;
            width: min(460px, calc(100vw - 28px));
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            box-shadow: var(--card-shadow);
            animation: card-enter 0.55s cubic-bezier(0.16,1,0.3,1) both;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        @keyframes card-enter {
            from { opacity:0; transform:translateY(28px) scale(0.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }
        @keyframes shake {
            0%,100%{transform:translateX(0)} 18%{transform:translateX(-7px)}
            36%{transform:translateX(7px)} 54%{transform:translateX(-4px)}
            72%{transform:translateX(4px)}
        }

        /* Theme toggle */
        .theme-btn {
            position:absolute; top:16px; right:16px;
            background:var(--input-bg); border:1px solid var(--input-border);
            border-radius:9px; padding:7px 11px;
            cursor:pointer; font-size:15px; color:var(--muted);
            transition:all .2s; line-height:1;
        }
        .theme-btn:hover { color:var(--text); border-color:var(--blue); transform:scale(1.05); }

        /* Brand */
        .brand { text-align:center; margin-bottom:32px; }
        .brand-logo {
            display:inline-flex; align-items:center; gap:10px; margin-bottom:8px;
        }
        .brand-icon {
            width:44px; height:44px;
            background:linear-gradient(135deg,#3b82f6,#6366f1);
            border-radius:13px; display:flex; align-items:center; justify-content:center;
            font-size:22px; box-shadow:0 0 22px rgba(99,102,241,.45);
            animation:icon-pulse 3.5s ease-in-out infinite;
        }
        @keyframes icon-pulse {
            0%,100%{ box-shadow:0 0 22px rgba(99,102,241,.45); }
            50%    { box-shadow:0 0 38px rgba(59,130,246,.65); }
        }
        .brand-name { font-size:26px; font-weight:800; letter-spacing:-.6px; color:var(--text); }
        .brand-name span {
            background:linear-gradient(135deg,#3b82f6,#8b5cf6);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .brand-tagline {
            font-size:11.5px; color:var(--muted);
            letter-spacing:1.6px; text-transform:uppercase; margin-top:5px;
        }

        /* Form heading */
        .form-heading { margin-bottom:26px; }
        .form-heading h2 { font-size:21px; font-weight:700; color:var(--text); margin-bottom:4px; }
        .form-heading p  { font-size:13px; color:var(--muted); }

        /* Alert */
        .alert {
            border-radius:11px; font-size:13px; padding:11px 14px;
            margin-bottom:18px; display:none; align-items:flex-start; gap:9px;
            animation:alert-slide .25s ease;
        }
        @keyframes alert-slide {
            from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)}
        }
        .alert.show { display:flex; }
        .alert-icon { font-size:14px; flex-shrink:0; margin-top:1px; }
        .alert-error   { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#fca5a5; }
        .alert-success { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3); color:#86efac; }

        /* Form groups */
        .form-group { margin-bottom:18px; }
        .field-label {
            display:block; font-size:11.5px; font-weight:600;
            color:var(--label); text-transform:uppercase;
            letter-spacing:.75px; margin-bottom:8px;
        }

        /* Input wrapper */
        .input-wrapper { position:relative; }
        .input-icon {
            position:absolute; left:13px; top:50%; transform:translateY(-50%);
            font-size:16px; pointer-events:none; opacity:.45;
            transition:opacity .2s;
        }
        .input-wrapper:focus-within .input-icon { opacity:.85; }

        input[type="text"],
        input[type="password"] {
            width:100%;
            background:var(--input-bg);
            border:1.5px solid var(--input-border);
            border-radius:12px;
            color:var(--input-color);
            font-family:inherit; font-size:14.5px;
            padding:13px 16px 13px 42px;
            outline:none;
            transition:border-color .2s, box-shadow .2s, background .2s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color:var(--input-focus-border);
            box-shadow:0 0 0 3.5px var(--input-focus-shadow);
            background:rgba(59,130,246,.04);
        }
        input::placeholder { color:var(--placeholder); }
        .has-toggle input { padding-right:46px; }

        /* Eye toggle */
        .eye-toggle {
            position:absolute; right:12px; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer; padding:4px;
            color:var(--muted); display:flex; align-items:center; justify-content:center;
            transition:color .2s; border-radius:7px;
        }
        .eye-toggle:hover { color:var(--blue); }
        .eye-toggle svg { width:18px; height:18px; }

        /* Caps lock */
        .caps-warn {
            display:none; align-items:center; gap:5px;
            font-size:11px; color:#f59e0b; margin-top:5px;
        }
        .caps-warn.show { display:flex; }

        /* Remember / forgot row */
        .remember-row {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:22px; flex-wrap:wrap; gap:10px;
        }
        .check-label {
            display:flex; align-items:center; gap:8px;
            cursor:pointer; user-select:none;
        }
        .check-label input[type="checkbox"] {
            width:17px; height:17px; padding:0; margin:0;
            border:1.5px solid var(--check-border);
            background:var(--input-bg);
            border-radius:5px; cursor:pointer;
            accent-color:var(--blue);
            flex-shrink:0;
        }
        .check-label span { font-size:13px; color:var(--label); }
        .forgot-link {
            font-size:13px; color:var(--link);
            text-decoration:none; transition:opacity .2s;
        }
        .forgot-link:hover { opacity:.75; text-decoration:underline; }

        /* Primary button */
        .btn-primary {
            width:100%; padding:14px;
            background:linear-gradient(135deg,var(--blue) 0%,var(--indigo) 100%);
            border:none; border-radius:12px; color:#fff;
            font-family:inherit; font-size:15px; font-weight:700;
            cursor:pointer; letter-spacing:.3px;
            box-shadow:0 4px 24px rgba(59,130,246,.35);
            transition:transform .15s, box-shadow .2s, opacity .2s;
            overflow:hidden; position:relative;
        }
        .btn-primary::after {
            content:''; position:absolute; top:0; left:-100%;
            width:100%; height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);
            transition:left .55s;
        }
        .btn-primary:hover:not(:disabled)::after { left:100%; }
        .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 32px rgba(59,130,246,.45); }
        .btn-primary:active:not(:disabled) { transform:scale(0.98); }
        .btn-primary:disabled { opacity:.55; cursor:not-allowed; transform:none; }
        .btn-inner { display:flex; align-items:center; justify-content:center; gap:9px; }
        .spinner {
            width:17px; height:17px;
            border:2.5px solid rgba(255,255,255,.3);
            border-top-color:#fff; border-radius:50%;
            animation:spin .7s linear infinite; display:none;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .btn-primary.loading .spinner { display:block; }
        .btn-primary.loading .btn-text { opacity:.75; }

        /* Divider */
        .divider {
            border:none; border-top:1px solid var(--divider);
            margin:26px 0 22px;
        }

        /* Footer link */
        .footer-link { text-align:center; font-size:13.5px; color:var(--muted); }
        .footer-link a { color:var(--link); font-weight:600; text-decoration:none; }
        .footer-link a:hover { text-decoration:underline; }

        /* Toast */
        #toast {
            position:fixed; bottom:26px; right:26px; z-index:9999;
            background:#1a2744; border:1px solid rgba(255,255,255,.1);
            border-radius:13px; padding:13px 18px;
            font-size:13.5px; color:#f1f5f9;
            box-shadow:0 8px 32px rgba(0,0,0,.4);
            display:flex; align-items:center; gap:10px;
            max-width:340px;
            transform:translateY(80px); opacity:0;
            transition:transform .35s cubic-bezier(0.16,1,0.3,1), opacity .3s ease;
        }
        #toast.show { transform:translateY(0); opacity:1; }
        #toast.toast-success { border-color:rgba(34,197,94,.4); }
        #toast.toast-error   { border-color:rgba(239,68,68,.4); }
    </style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-overlay"></div>

<!-- Toast notification -->
<div id="toast">
    <span id="toast-icon">✅</span>
    <span id="toast-msg">Message here</span>
</div>

<div class="auth-card" id="auth-card">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">☀️</button>

    <!-- Brand -->
    <div class="brand">
        <div class="brand-logo">
            <div class="brand-icon">🚀</div>
            <div class="brand-name">AERO<span>SENSE</span></div>
        </div>
        <div class="brand-tagline">NASA Turbofan AI Monitor</div>
    </div>

    <!-- Heading -->
    <div class="form-heading">
        <h2>Welcome back 👋</h2>
        <p>Sign in to continue to your dashboard</p>
    </div>

    <!-- Error alert -->
    <div class="alert alert-error" id="error-alert">
        <span class="alert-icon">⚠️</span>
        <span id="error-msg"></span>
    </div>

    <!-- Form -->
    <form id="login-form" onsubmit="handleLogin(event)" novalidate>

        <!-- Username -->
        <div class="form-group">
            <label class="field-label" for="username">Username</label>
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" id="username" placeholder="Enter your username"
                       autocomplete="username" required
                       oninput="clearError()">
            </div>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label class="field-label" for="password">Password</label>
            <div class="input-wrapper has-toggle">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" placeholder="Enter your password"
                       autocomplete="current-password" required
                       oninput="clearError()" onkeyup="checkCapsLock(event)">
                <button type="button" class="eye-toggle" onclick="toggleEye('password','eye-open','eye-closed')" aria-label="Show/hide password">
                    <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
            <div class="caps-warn" id="caps-warn">⚠️ Caps Lock is on</div>
        </div>

        <!-- Remember me + Forgot -->
        <div class="remember-row">
            <label class="check-label">
                <input type="checkbox" id="remember-me">
                <span>Remember me for 30 days</span>
            </label>
            <a href="#" class="forgot-link" onclick="forgotPassword(event)">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" id="login-btn">
            <div class="btn-inner">
                <div class="spinner"></div>
                <span class="btn-text">Sign In →</span>
            </div>
        </button>

    </form>

    <hr class="divider">

    <div class="footer-link">
        New here? <a href="register.html">Create an account →</a>
    </div>
</div>

<script>
// ── Theme ─────────────────────────────────────────────────────────────────────
(function applyTheme() {
    const t = localStorage.getItem('aerosense_theme');
    if (t === 'light') {
        document.documentElement.setAttribute('data-theme','light');
        document.getElementById('theme-btn').textContent = '🌙';
    }
})();

function toggleTheme() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('aerosense_theme','dark');
        document.getElementById('theme-btn').textContent = '☀️';
    } else {
        document.documentElement.setAttribute('data-theme','light');
        localStorage.setItem('aerosense_theme','light');
        document.getElementById('theme-btn').textContent = '🌙';
    }
}

// ── Already logged in → redirect ──────────────────────────────────────────────
if (localStorage.getItem('aerosense_token')) {
    window.location.href = 'index.html';
}

// ── Starfield Canvas ──────────────────────────────────────────────────────────
(function starfield() {
    const canvas = document.getElementById('stars-canvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const isLight = () => document.documentElement.getAttribute('data-theme') === 'light';

    const stars = Array.from({length: 200}, () => ({
        x:     Math.random(),
        y:     Math.random(),
        r:     Math.random() * 1.3 + 0.2,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.014 + 0.004,
        hue:   Math.random() > 0.88 ? 217 : Math.random() > 0.78 ? 270 : 0
    }));

    let shooters = [];
    function addShooter() {
        if (!isLight()) {
            shooters.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.45,
                vx: Math.random() * 5 + 3,
                vy: Math.random() * 2.5 + 1,
                life: 1
            });
        }
        setTimeout(addShooter, Math.random() * 7000 + 4500);
    }
    setTimeout(addShooter, 2500);

    let frame = 0;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frame++;
        const light = isLight();

        stars.forEach(s => {
            const op = light
                ? 0.08 + 0.1 * Math.sin(frame * s.speed + s.phase)
                : 0.25 + 0.55 * Math.sin(frame * s.speed + s.phase);
            ctx.globalAlpha = Math.max(0, op);
            ctx.beginPath();
            ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
            ctx.fillStyle = s.hue === 217 ? '#60a5fa'
                          : s.hue === 270 ? '#a78bfa'
                          : '#ffffff';
            ctx.fill();
        });
        ctx.globalAlpha = 1;

        shooters = shooters.filter(s => {
            s.x += s.vx; s.y += s.vy; s.life -= 0.02;
            if (s.life <= 0) return false;
            const g = ctx.createLinearGradient(s.x - s.vx * 9, s.y - s.vy * 9, s.x, s.y);
            g.addColorStop(0, 'rgba(255,255,255,0)');
            g.addColorStop(1, `rgba(255,255,255,${s.life * 0.75})`);
            ctx.beginPath();
            ctx.moveTo(s.x - s.vx * 9, s.y - s.vy * 9);
            ctx.lineTo(s.x, s.y);
            ctx.strokeStyle = g;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            return true;
        });

        requestAnimationFrame(draw);
    }
    draw();
})();

// ── Eye toggle ────────────────────────────────────────────────────────────────
function toggleEye(inputId, openId, closedId) {
    const input = document.getElementById(inputId);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    document.getElementById(openId).style.display   = show ? 'none'  : '';
    document.getElementById(closedId).style.display = show ? ''      : 'none';
}

// ── Caps Lock ─────────────────────────────────────────────────────────────────
function checkCapsLock(e) {
    const warn = document.getElementById('caps-warn');
    const on   = e.getModifierState && e.getModifierState('CapsLock');
    warn.classList.toggle('show', on);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='success') {
    clearTimeout(toastTimer);
    const toast = document.getElementById('toast');
    document.getElementById('toast-icon').textContent = type === 'success' ? '✅' : '❌';
    document.getElementById('toast-msg').textContent  = msg;
    toast.className = 'show toast-' + type;
    toastTimer = setTimeout(() => { toast.className = ''; }, 4500);
}

// ── Alerts ────────────────────────────────────────────────────────────────────
function showError(msg) {
    const el = document.getElementById('error-alert');
    document.getElementById('error-msg').textContent = msg;
    el.classList.add('show');
    const card = document.getElementById('auth-card');
    card.style.animation = 'none';
    void card.offsetHeight;
    card.style.animation = 'shake 0.4s ease';
}
function clearError() {
    document.getElementById('error-alert').classList.remove('show');
}

// ── Forgot password ───────────────────────────────────────────────────────────
function forgotPassword(e) {
    e.preventDefault();
    showToast('Contact your administrator to reset your password.', 'error');
}

// ── Login handler ─────────────────────────────────────────────────────────────
async function handleLogin(e) {
    e.preventDefault();
    clearError();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember-me').checked;

    if (!username) { showError('Please enter your username.'); return; }
    if (!password) { showError('Please enter your password.');  return; }

    const btn = document.getElementById('login-btn');
    const btnText = btn.querySelector('.btn-text');
    btn.disabled = true;
    btn.classList.add('loading');
    btnText.textContent = 'Signing in…';

    try {
        const res  = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, remember_me: remember })
        });
        const data = await res.json();

        if (!res.ok) {
            showError(data.detail || 'Invalid username or password.');
            return;
        }

        // Persist session
        localStorage.setItem('aerosense_token',    data.access_token);
        localStorage.setItem('aerosense_username',  data.username);
        localStorage.setItem('aerosense_is_admin',  data.is_admin ? 'true' : 'false');
        if (remember) localStorage.setItem('aerosense_remember','true');
        else          localStorage.removeItem('aerosense_remember');

        const label = data.is_admin ? `Welcome back, ${data.username}! ⭐ (Admin)` : `Welcome back, ${data.username}! 👋`;
        showToast(label, 'success');

        setTimeout(() => { window.location.href = 'index.html'; }, 700);

    } catch {
        showError('Network error. Please check your connection and try again.');
    } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        btnText.textContent = 'Sign In →';
    }
}

// Allow Enter key from any field
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !['BUTTON','TEXTAREA'].includes(e.target.tagName)) {
        document.getElementById('login-form').requestSubmit();
    }
});
</script>
</body>
</html>
